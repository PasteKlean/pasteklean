name: Build MSIX for Microsoft Store

on:
  push:
    branches: [main]

jobs:
  build-msix:
    runs-on: windows-latest
    env:
      MSIX_PUBLISHER: "CN=7DA92BF0-DE5F-4FAF-AE9C-0E3AADBBE3D2"
      MSIX_IDENTITY_NAME: "PasteKlean.PasteKlean"
      MSIX_APPLICATION_ID: "App"
      MSIX_DISPLAY_NAME: "PasteKlean"
      MSIX_PUBLISHER_DISPLAY_NAME: "PasteKlean"
      MSIX_BACKGROUND_COLOR: "transparent"
      MSIX_LANGUAGES: "en-US"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Windows Store MSIX package
        run: npm run build:win-store

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pasteclean-msix
          path: dist/*.msix
          if-no-files-found: error
