name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump
        run: |
          npm version ${{ github.event.inputs.version }} -m "chore(release): %s"
          echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          git push --follow-tags

  build-and-release:
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      MSIX_PUBLISHER: "CN=7DA92BF0-DE5F-4FAF-AE9C-0E3AADBBE3D2"
      MSIX_IDENTITY_NAME: "PasteKlean.PasteKlean"
      MSIX_APPLICATION_ID: "App"
      MSIX_DISPLAY_NAME: "PasteKlean"
      MSIX_PUBLISHER_DISPLAY_NAME: "PasteKlean"
      MSIX_BACKGROUND_COLOR: "transparent"
      MSIX_LANGUAGES: "en-US"
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish macOS
        if: runner.os == 'macOS'
        run: npm run release:mac

      - name: Build and publish Windows
        if: runner.os == 'Windows'
        run: npm run release:win
